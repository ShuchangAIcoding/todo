<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办清单</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --border-radius: 12px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: var(--border-radius);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .add-btn {
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 500;
            cursor: default;
            transition: opacity 0.2s ease;
        }

        .add-btn:hover {
            opacity: 0.9;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: var(--border-radius);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
        }

        .todo-item:hover {
            transform: translateY(-2px);
        }

        .checkbox-wrapper {
            margin-right: 12px;
            display: flex;
            align-items: center;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: default;
            accent-color: var(--accent-color);
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .delete-btn {
            background: none;
            border: none;
            color: #b0b0b5;
            font-size: 14px;
            cursor: default;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .delete-btn:hover {
            background-color: #f2f2f7;
            color: #ff3b30;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✅ My Todo List</h1>

    <div class="input-group">
        <input type="text" placeholder="添加新任务...">
        <button class="add-btn">添加</button>
    </div>

    <ul class="todo-list">
        <!-- 已完成状态 -->
        <li class="todo-item completed">
            <div class="checkbox-wrapper">
                <input type="checkbox" checked disabled>
            </div>
            <span class="todo-text">学习AI提示词</span>
            <button class="delete-btn">删除</button>
        </li>

        <!-- 未完成状态 -->
        <li class="todo-item">
            <div class="checkbox-wrapper">
                <input type="checkbox" disabled>
            </div>
            <span class="todo-text">完成Day7项目</span>
            <button class="delete-btn">删除</button>
        </li>

        <!-- 未完成状态 -->
        <li class="todo-item">
            <div class="checkbox-wrapper">
                <input type="checkbox" disabled>
            </div>
            <span class="todo-text">部署到Vercel</span>
            <button class="delete-btn">删除</button>
        </li>
    </ul>
</div>

</body>
</html>
